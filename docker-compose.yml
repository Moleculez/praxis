services:
  # === Production infrastructure (opt-in via --profile prod) ===

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: praxis
      POSTGRES_PASSWORD: praxis
      POSTGRES_DB: praxis_ts
    volumes:
      - timescale-data:/var/lib/postgresql/data
    networks:
      - praxis-net
    profiles:
      - prod

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: praxis
      POSTGRES_PASSWORD: praxis
      POSTGRES_DB: praxis
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - praxis-net
    profiles:
      - prod

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - praxis-net
    profiles:
      - prod

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    networks:
      - praxis-net
    profiles:
      - prod

  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    ports:
      - "5000:5000"
    depends_on:
      - postgres
      - minio
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ACCESS_KEY:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_SECRET_KEY:-minioadmin}
    command: >
      mlflow server
        --host 0.0.0.0
        --port 5000
        --backend-store-uri postgresql://praxis:praxis@postgres:5432/praxis
        --default-artifact-root s3://praxis-artifacts
    networks:
      - praxis-net
    profiles:
      - prod

  # === Local LLM (opt-in via --profile local-llm) ===

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - praxis-net
    profiles:
      - local-llm

  # === Backend (always available) ===

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./audit:/app/audit
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - praxis-net

volumes:
  timescale-data:
  postgres-data:
  minio-data:
  ollama-data:

networks:
  praxis-net:
    driver: bridge
